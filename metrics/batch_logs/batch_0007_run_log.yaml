decision_implication: Adopt context gating in the sparse reviewer-routing layer,
  but do not promote any new sparse feature until a human feature-review queue
  decision accepts it.
next_action: Use context gates to route result-display cases by reviewer burden;
  keep high-value discovery focused on strong_source_priority while preserving
  result-display holdouts for calibration.
