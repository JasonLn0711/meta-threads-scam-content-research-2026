cluster_results:
  sparse_summary: one broad sparse cluster after Batch 0006; contrast-aware routing
    remains necessary because sparse clustering alone over-generalizes the mixed
    metadata space.
  embedding_summary: discovery-only embedding output still covers only synthetic
    embedded examples; Batch 0006 records use no embedding decisions.
  discrepancy_summary:
    case_count: 2
    missed_pattern: 0
    over_generalization: 2
failure_modes:
- Sparse clustering is too broad to serve as the only reviewer routing signal.
- Result-display context cases remain costly and uncertain even when structured
  metadata is complete.
- Embedding coverage is missing for Batch 0006 and cannot be used for decisions.
decision_implication: Batch 0006 supports keeping contrast-aware routing. The
  fast lane is not simply "保證收益"; it is "保證收益 plus executable transition
  and low context burden". Broad result-display context cases should remain in
  slower review because they increase reviewer effort without increasing direct
  positive yield in this batch.
next_action: Keep strong_source_priority as the high-priority source lane, keep
  result_display_context_review as a slow context lane, and run the next small
  batch on the highest-uncertainty boundary rather than adding new modules.
