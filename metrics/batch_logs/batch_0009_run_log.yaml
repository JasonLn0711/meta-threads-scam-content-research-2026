    vectors and 73 are skipped for missing vectors.
  discrepancy_summary: No missed_pattern groups remain; the latest report contains
    two synthetic over_generalization cases only.
failure_modes:
- One fast-lane candidate required second review because the stable funnel anchor
  was absent.
- The low-context and thread-required result-display probes remained uncertain, supporting
  continued caps.
- Sparse clustering remains too broad to be treated as a reliable separation layer
  without further schema or threshold work.
- Embedding coverage is too sparse for discovery beyond synthetic diagnostics.
decision_implication: 'Batch 0009 supports the active context-gating policy: prioritize
  strong_source_priority under constrained reviewer capacity, preserve clean result-display
  holdouts for hard-negative calibration, and keep result-display transition/context
  probes capped.'
next_action: Use the supported context-gating policy as the routing base for a reviewer-assist/schema-prefill
