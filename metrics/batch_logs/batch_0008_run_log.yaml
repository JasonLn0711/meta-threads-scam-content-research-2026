failure_modes:
- Result-display lanes B and C produced zero positive yield in this capped batch.
- Thread-required result-display review was the most expensive lane and produced
  no high-value candidates in this sample.
- Sparse clustering remains too broad to be treated as a reliable separation layer
  without further schema or threshold work.
- Embedding coverage is too sparse for discovery beyond synthetic diagnostics.
decision_implication: Under constrained reviewer capacity, prioritize
  strong_source_priority and keep result-display lanes for boundary calibration,
  context-gating diagnostics, or tiny targeted probes rather than broad review.
next_action: Convert this result into a context-gating policy note; do not promote
  new sparse features from Batch 0008 because no valid missed-pattern feature
  candidates were produced.
