failure_modes:
- Batch-level SVS decreased versus Batch 0004 because Batch 0005 intentionally included
  contrast and hard-negative/uncertain cases.
- Broad 成果展示 remained ambiguous and burden-heavy without explicit 保證收益.
- Sparse clustering became broad enough that cluster separation should not be treated
  as settled.
- Missing embeddings prevent discovery-layer comparison for Batch 0005 records.
decision_implication: A arm and the broader strong_source_priority lane are better
  source arms for high-value candidate discovery per reviewer effort. B arm should
  remain a context-dependent contrast source, not a direct negative class and not
  a primary high-yield source.
next_action: Use contrast-aware routing in the next small exploration loop while
  keeping any sparse-schema promotion human-reviewed.
