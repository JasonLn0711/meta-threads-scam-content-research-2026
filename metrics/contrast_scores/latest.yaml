recommendations:
- Prioritize strong_source_priority candidates when reviewer capacity is constrained.
- Route result_display_context_review candidates to slower context review instead
  of fast priority review.
- Keep result_display_contrast_holdout candidates as hard-negative or boundary calibration
  material.
guardrails:
  raw_threads_content_included: false
  pii_included: false
  embedding_used_for_decision: false
  sparse_schema_updated: false
  human_review_required: true
  legal_or_enforcement_decision_made: false
