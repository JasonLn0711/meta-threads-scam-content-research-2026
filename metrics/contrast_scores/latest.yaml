schema_version: contrast_aware_scores_v1
decision_layer: sparse_primary_reviewer_routing
purpose: route reviewed sparse metadata patterns by expected value per reviewer effort
not_a_classifier: true
formula: lane SVS uses (yield_rate * information_density) / (review_time * cognitive_load);
  lane routing is a testable reviewer-effort hypothesis
positive_yield_definition: human research label scam, not legal fraud
candidate_count: 36
lane_definitions:
  strong_source_priority:
    pre_review_activation_rule: 保證收益 AND (誘導聯絡 OR 社群導流 OR reply_funnel OR review_stable_funnel_anchor)
      AND NOT needs_thread
    routing_action: fast_priority_review
    interpretation: High-value source arm when a guarantee/certainty anchor has executable
      transition structure and low thread burden.
  guarantee_context_review:
    pre_review_activation_rule: 保證收益 AND NOT strong_source_priority
    routing_action: priority_context_review
    interpretation: Guarantee/certainty anchor remains important, but needs slower
      review when transition structure is weak or context burden is high.
  result_display_context_review:
    pre_review_activation_rule: 成果展示 AND NOT 保證收益 AND (誘導聯絡 OR 社群導流 OR reply_funnel
      OR needs_thread OR 情緒操控)
    routing_action: slow_context_review
    interpretation: Result display without explicit guarantee is a context-cost signal,
      not a high-priority source arm by itself.
  result_display_contrast_holdout:
    pre_review_activation_rule: 成果展示 AND NOT 保證收益 AND NOT (誘導聯絡 OR 社群導流 OR reply_funnel
      OR needs_thread OR 情緒操控)
    routing_action: contrast_or_hard_negative_pool
    interpretation: Standalone result display is useful for hard-negative contrast
      and boundary calibration.
  other_metadata_review:
    pre_review_activation_rule: candidate does not match the defined contrast lanes
    routing_action: standard_review
    interpretation: Keep in standard metadata review until a useful contrast pattern
      is observed.
