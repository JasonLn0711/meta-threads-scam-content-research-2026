schema_version: exploration_batch_v1
batch_id: batch-0005-guarantee-vs-result-display-contrast
purpose: capped contrast batch for testing guarantee/funnel strength against broad result-display ambiguity
selected_task_ids:
- EXP_0005_A
- EXP_0005_B
selected_tasks:
- task_id: EXP_0005_A
  gap_type: contrast_arm
  hypothesis: '`保證收益` paired with funnel or contact structure will preserve high
    SVS with lower reviewer burden than broad result-display evidence.'
  source_hint: guarantee plus funnel/contact candidate surface
  search_cues:
  - guarantee-or-certainty cue
  - contact transition cue
  - group or reply funnel cue
  priority: high
  signal_hint: 保證收益
  expected_behavior: guarantee_funnel_anchor
  contrast_arm: A
  target_stub_count: 5
  expected_impact:
    clustering: test whether guarantee plus funnel/contact structure remains a stable
      sparse cluster
    reviewer_effort: test whether the signal keeps low review time and low second-review
      pressure
- task_id: EXP_0005_B
  gap_type: contrast_arm
  hypothesis: Broad `成果展示` without explicit `保證收益` will remain mixed or burden-heavy
    unless a narrower subcondition explains its value.
  source_hint: result-display without explicit guarantee candidate surface
  search_cues:
  - result display cue
  - no explicit guarantee cue
  - hard-negative or ambiguous result-sharing contrast
  priority: high
  signal_hint: 成果展示
  expected_behavior: result_display_without_guarantee
  contrast_arm: B
  target_stub_count: 5
  expected_impact:
    clustering: test whether broad result display separates into useful and weak
      sparse subgroups
    reviewer_effort: measure whether `needs_thread`, second review, or uncertain
      decisions explain the weak SVS
candidate_stub_count: 10
candidate_stub_ids:
- STUB_0005_A_01
- STUB_0005_A_02
- STUB_0005_A_03
- STUB_0005_A_04
- STUB_0005_A_05
- STUB_0005_B_01
- STUB_0005_B_02
- STUB_0005_B_03
- STUB_0005_B_04
- STUB_0005_B_05
before_metrics:
  source: metrics/signal_scores/latest_ranking.yaml
  candidate_count: 14
  target_signals:
    保證收益:
      reviewed_count: 6
      yield_rate: 1.0
      review_time: 42.333333
      cognitive_load: 1.325
      svs: 0.015351855
    成果展示:
      reviewed_count: 9
      yield_rate: 0.444444
      review_time: 46.111111
      cognitive_load: 1.922222
      svs: 0.00358105
success_checks:
- Arm A keeps higher SVS than Arm B after reviewed metadata enters the ROS, or the failure mode is clear.
- Arm B explains its lower SVS through `needs_thread`, second-review pressure, uncertain decisions, or absence of funnel/contact structure.
- Sparse clustering separates guarantee/funnel candidates from weak result-display candidates in an explainable way.
- New discrepancy cases, if any, generate feature hypotheses rather than schema changes.
- Reviewer effort stays bounded at 10 stubs maximum.
stop_rules:
- Stop if any step would require raw Threads content in git.
- Stop if any step would require PII, handles, raw URLs, screenshots, browser exports,
  credentials, or controlled-store paths.
- Stop if manual-assisted review cannot keep evidence metadata-only.
- Stop if reviewer burden exceeds the planned 10-stub batch.
- Stop if a reviewer cannot distinguish Arm A and Arm B without raw content leakage.
guardrails:
  external_systems_accessed: false
  raw_threads_content_included: false
  pii_included: false
  embedding_used_for_decision: false
  collection_method: safe / manual-assisted
  this_file_authorizes_collection: false
