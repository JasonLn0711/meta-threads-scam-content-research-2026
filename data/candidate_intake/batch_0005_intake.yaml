- ./.venv/bin/python scripts/convert_candidate_intake_v2.py data/candidate_intake/batch_0005_intake.yaml
  --report-output data/candidate_intake/batch_0005_conversion_report.yaml
- ./.venv/bin/python scripts/convert_candidate_intake_v2.py data/candidate_intake/batch_0005_intake.yaml
  --report-output data/candidate_intake/batch_0005_conversion_report.yaml --write-candidates
- ./.venv/bin/python scripts/validate_candidate_v2.py data/candidates
- ./.venv/bin/python scripts/run_v2_ros.py
- ./.venv/bin/python scripts/generate_feature_candidates_v1.py
- ./.venv/bin/python scripts/generate_exploration_tasks.py
