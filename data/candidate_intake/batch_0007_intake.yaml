completion_rules:
- Fill only structured metadata observations.
- Do not paste raw Threads content into this repo.
- Do not include PII, raw URLs, handles, screenshots, browser artifacts, credentials,
  or controlled-store locators.
- Do not infer final labels before human review.
- Convert to candidate_record_v2 only after completion gates are satisfied.
after_fill_commands:
- ./.venv/bin/python scripts/validate_candidate_intake_v2.py data/candidate_intake/batch_0007_intake.yaml
  --expected-count 12
- ./.venv/bin/python scripts/convert_candidate_intake_v2.py data/candidate_intake/batch_0007_intake.yaml
  --report-output data/candidate_intake/batch_0007_conversion_report.yaml
- ./.venv/bin/python scripts/convert_candidate_intake_v2.py data/candidate_intake/batch_0007_intake.yaml
  --report-output data/candidate_intake/batch_0007_conversion_report.yaml --write-candidates
- ./.venv/bin/python scripts/validate_candidate_v2.py data/candidates
- ./.venv/bin/python scripts/run_v2_ros.py
- ./.venv/bin/python scripts/run_contrast_aware_scoring.py
- ./.venv/bin/python scripts/generate_feature_candidates_v1.py
- ./.venv/bin/python scripts/generate_exploration_tasks.py
